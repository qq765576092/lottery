<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抽奖工具</title>
  <script src="https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #e0e0e0; padding: 24px; }
    h1 { text-align: center; font-size: 2rem; color: #f0c040; letter-spacing: 4px; margin-bottom: 32px; text-shadow: 0 0 20px rgba(240,192,64,0.5); }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; margin-bottom: 24px; backdrop-filter: blur(10px); }
    .card h2 { font-size: 1rem; color: #a0b4c8; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 2px; }
    .paste-area { width: 100%; min-height: 160px; background: rgba(255,255,255,0.04); border: 2px solid rgba(240,192,64,0.3); border-radius: 12px; padding: 16px; color: #e0e0e0; font-size: 0.85rem; font-family: "Consolas","Courier New",monospace; resize: vertical; outline: none; transition: border-color 0.2s; line-height: 1.6; }
    .paste-area:focus { border-color: #f0c040; }
    .paste-area::placeholder { color: rgba(160,180,200,0.5); }
    .stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat-box { flex: 1; min-width: 120px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-box .num { font-size: 2rem; font-weight: bold; color: #f0c040; }
    .stat-box .label { font-size: 0.8rem; color: #a0b4c8; margin-top: 4px; }
    .mapping { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .mapping label { font-size: 0.95rem; color: #e8e8e8; font-weight: bold; margin-bottom: 4px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mapping .role-hint { font-size: 0.72rem; color: #607080; display: block; margin-bottom: 4px; }
    .mapping select { width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #e0e0e0; font-size: 0.9rem; cursor: pointer; }
    .mapping select:focus { outline: none; border-color: #f0c040; }
    .mapping select option { background: #1a1a2e; }
    .mapping select.role-matched { border-color: rgba(240,192,64,0.5); }
    .table-wrap { max-height: 240px; overflow-y: auto; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th { background: rgba(240,192,64,0.15); color: #f0c040; padding: 10px 14px; text-align: left; position: sticky; top: 0; }
    tbody tr:nth-child(even) { background: rgba(255,255,255,0.03); }
    tbody td { padding: 8px 14px; color: #ccc; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .draw-btn { display: block; width: 100%; padding: 16px; background: linear-gradient(90deg, #f0c040, #e07820); border: none; border-radius: 12px; color: #1a1a2e; font-size: 1.2rem; font-weight: bold; letter-spacing: 4px; cursor: pointer; transition: all 0.3s; }
    .draw-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(240,192,64,0.4); }
    .draw-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .winners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .winner-card { background: linear-gradient(135deg, rgba(240,192,64,0.1), rgba(224,120,32,0.1)); border: 1px solid rgba(240,192,64,0.3); border-radius: 12px; padding: 16px; animation: pop 0.4s ease forwards; opacity: 0; }
    @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .winner-rank { font-size: 1.4rem; font-weight: bold; color: #f0c040; margin-bottom: 6px; }
    .winner-buyer { font-size: 1rem; color: #fff; word-break: break-all; }
    .winner-order { font-size: 0.75rem; color: #a0b4c8; margin-top: 4px; }
    .winner-amount { font-size: 0.75rem; color: #a0b4c8; }
    .export-btn { display: inline-block; margin-top: 16px; padding: 10px 24px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #e0e0e0; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
    .export-btn:hover { background: rgba(255,255,255,0.15); }
    .hidden { display: none !important; }
    .tip { font-size: 0.8rem; color: #a0b4c8; margin-top: 8px; }
    .snum { display: inline-block; letter-spacing: 1px; }
    .stats-toggle-btn { font-size: 0.78rem; padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: #a0b4c8; cursor: pointer; }
    .tier-btn { padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #a0b4c8; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .tier-btn:hover { background: rgba(255,255,255,0.1); }
    .tier-active { background: rgba(240,192,64,0.2) !important; border-color: #f0c040 !important; color: #f0c040 !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <h1>&#127881; 幸运抽奖</h1>

  <div class="card">
    <h2>第一步 · 粘贴数据</h2>
    <textarea class="paste-area" id="pasteArea" placeholder="从 Excel 或 CSV 复制数据后，直接在此处 Ctrl+V 粘贴&#10;&#10;第一行必须为表头，例如：订单ID、买家ID、用户昵称、金额"></textarea>
    <p class="tip" id="fileName"></p>
  </div>

  <div class="card hidden" id="mappingCard">
    <h2>第二步 · 对应列名</h2>
    <div class="mapping" id="mappingGrid"></div>
    <p class="tip" style="margin-top:12px">* 必须指定「买家ID」列用于去重；其余列可选，未指定则跳过</p>
  </div>

  <div class="card hidden" id="previewCard">
    <h2 style="display:flex;justify-content:space-between;align-items:center">
      <span>第三步 · 数据预览</span>
      <button class="stats-toggle-btn" id="statsToggleBtn">&#128065; 显示数字</button>
    </h2>
    <div class="stats" id="stats"></div>
    <div class="table-wrap" style="margin-top:16px">
      <table><thead><tr id="previewHead"></tr></thead><tbody id="previewBody"></tbody></table>
    </div>
  </div>

  <div class="card hidden" id="drawCard">
    <h2>第四步 · 开始抽奖</h2>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <label style="color:#a0b4c8;font-size:0.9rem;white-space:nowrap">奖项类型</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button type="button" class="tier-btn tier-active" id="tierAll">全部参与</button>
        <button type="button" class="tier-btn" id="tier1st">&#129351; 一等奖（&#8805;10单）</button>
        <button type="button" class="tier-btn" id="tier2nd">&#129352; 二等奖（&#8805;5单）</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <label style="color:#a0b4c8;font-size:0.9rem;white-space:nowrap">抽取人数</label>
      <input id="drawCount" type="number" min="1" value="10" style="width:100px;padding:8px 12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#e0e0e0;font-size:1rem;text-align:center;outline:none;" />
      <span style="color:#a0b4c8;font-size:0.85rem" id="drawCountHint"></span>
    </div>
    <button class="draw-btn" id="drawBtn" disabled>开始抽奖</button>
  </div>

  <div class="card hidden" id="winnersCard">
    <h2 id="winnersTitle">&#127881; 中奖名单</h2>
    <div class="winners-grid" id="winnersGrid"></div>
    <div>
      <button class="export-btn" id="exportBtn">导出中奖名单 (Excel)</button>
      <button class="export-btn" id="redrawBtn" style="margin-left:8px">重新抽取</button>
    </div>
  </div>

  <script>
    var rawRows = [], headers = [];
    var currentTier = 'all';
    var pasteArea = document.getElementById('pasteArea');

    pasteArea.addEventListener('paste', function() {
      setTimeout(function() { handlePaste(pasteArea.value); }, 0);
    });
    pasteArea.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) handlePaste(pasteArea.value);
    });

    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function maskId(s) {
      s = String(s).trim();
      if (s.length <= 6) return s.slice(0, 1) + '****';
      return s.slice(0, 3) + '****' + s.slice(-4);
    }

    function maskName(s) {
      s = String(s).trim();
      if (!s) return s;
      if (s.length === 1) return '*';
      if (s.length === 2) return s.slice(0, 1) + '*';
      return s.slice(0, 1) + '**' + s.slice(-1);
    }

    function getDrawCount() {
      var el = document.getElementById('drawCount');
      return Math.max(1, parseInt(el ? el.value : '10') || 10);
    }

    function getRoleCol(role) {
      var sels = document.querySelectorAll('#mappingGrid select');
      for (var i = 0; i < sels.length; i++) {
        if (sels[i].value === role) return sels[i].getAttribute('data-col');
      }
      return '';
    }

    function detectRole(colName) {
      var lc = colName.toLowerCase().replace(/\s+/g, '');

      var buyerKw = ['买家id', 'buyerid', 'buyer_id', '用户id', 'userid', 'user_id', '会员id', 'memberid', '客户id'];
      for (var i = 0; i < buyerKw.length; i++) { if (lc === buyerKw[i] || lc.indexOf(buyerKw[i]) !== -1) return 'buyerId'; }

      var countKw = ['订单数', 'ordercount', 'order_count', '购买次数', '消费次数', '下单次数', '购买数量'];
      for (var i = 0; i < countKw.length; i++) { if (lc === countKw[i] || lc.indexOf(countKw[i]) !== -1) return 'orderCount'; }

      var orderKw = ['订单id', 'orderid', 'order_id', '订单号', '流水号', '交易号', '订单编号', '单号'];
      for (var i = 0; i < orderKw.length; i++) { if (lc === orderKw[i] || lc.indexOf(orderKw[i]) !== -1) return 'orderId'; }

      var nickKw = ['昵称', 'nickname', 'username', 'user_name', '用户名', '姓名', 'name'];
      for (var i = 0; i < nickKw.length; i++) { if (lc === nickKw[i] || lc.indexOf(nickKw[i]) !== -1) return 'nickname'; }

      var amtKw = ['金额', 'amount', 'price', '支付金额', '实付', '付款', '消费金额'];
      for (var i = 0; i < amtKw.length; i++) { if (lc === amtKw[i] || lc.indexOf(amtKw[i]) !== -1) return 'amount'; }

      return '';
    }

    var roleOptions = [
      { v: '', t: '(不使用)' },
      { v: 'buyerId', t: '★ 买家ID（去重用）' },
      { v: 'orderId', t: '订单ID' },
      { v: 'nickname', t: '用户昵称' },
      { v: 'amount', t: '订单金额' },
      { v: 'orderCount', t: '订单数（用于奖项筛选）' }
    ];

    function getUniqueBuyers() {
      var col = getRoleCol('buyerId');
      if (!col) return new Set();
      var set = new Set();
      for (var i = 0; i < rawRows.length; i++) {
        var v = String(rawRows[i][col]).trim();
        if (v) set.add(v);
      }
      return set;
    }

    function getOrderCountsMap() {
      if (!rawRows.length) return {};
      var colBuyer = getRoleCol('buyerId');
      var colOC = getRoleCol('orderCount');
      if (!colBuyer) return {};
      var counts = {};
      if (colOC) {
        for (var i = 0; i < rawRows.length; i++) {
          var key = String(rawRows[i][colBuyer]).trim();
          if (!key) continue;
          var val = parseInt(rawRows[i][colOC]) || 0;
          if (counts[key] === undefined || val > counts[key]) counts[key] = val;
        }
      } else {
        for (var i = 0; i < rawRows.length; i++) {
          var key = String(rawRows[i][colBuyer]).trim();
          if (!key) continue;
          counts[key] = (counts[key] || 0) + 1;
        }
      }
      return counts;
    }

    function getPoolForTier(tier) {
      if (!rawRows.length) return [];
      var colBuyer = getRoleCol('buyerId');
      if (!colBuyer) return [];
      var orderCounts = getOrderCountsMap();
      var seen = {};
      var pool = [];
      for (var i = 0; i < rawRows.length; i++) {
        var key = String(rawRows[i][colBuyer]).trim();
        if (!key || seen[key]) continue;
        seen[key] = true;
        var cnt = orderCounts[key] || 0;
        if (tier === 'first' && cnt < 10) continue;
        if (tier === 'second' && cnt < 5) continue;
        pool.push(rawRows[i]);
      }
      return pool;
    }

    function selectTier(tier) {
      currentTier = tier;
      var btns = ['tierAll', 'tier1st', 'tier2nd'];
      var tiers = ['all', 'first', 'second'];
      for (var i = 0; i < btns.length; i++) {
        var el = document.getElementById(btns[i]);
        if (tiers[i] === tier) { el.classList.add('tier-active'); }
        else { el.classList.remove('tier-active'); }
      }
      if (rawRows.length > 0) refreshPreview();
    }

    function showError(msg) {
      var el = document.getElementById('fileName');
      el.style.color = '#ff6b6b';
      el.textContent = '错误：' + msg;
    }

    function parseDelimited(text, delim) {
      var rows = [], row = [], field = '', inQuote = false;
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      for (var i = 0; i < text.length; i++) {
        var ch = text[i];
        if (inQuote) {
          if (ch === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; }
            else { inQuote = false; }
          } else { field += ch; }
        } else {
          if (ch === '"') { inQuote = true; }
          else if (text.indexOf(delim, i) === i) { row.push(field.trim()); field = ''; i += delim.length - 1; }
          else if (ch === '\n') { row.push(field.trim()); rows.push(row); row = []; field = ''; }
          else { field += ch; }
        }
      }
      row.push(field.trim());
      var hasContent = false;
      for (var k = 0; k < row.length; k++) { if (row[k] !== '') { hasContent = true; break; } }
      if (hasContent) rows.push(row);
      return rows;
    }

    function handlePaste(text) {
      var el = document.getElementById('fileName');
      el.style.color = '#a0b4c8';
      text = text.trim();
      if (!text) return;
      try {
        var firstLine = text.split('\n')[0];
        var delim = firstLine.indexOf('\t') !== -1 ? '\t' : ',';
        var data = parseDelimited(text, delim);
        var fmt = delim === '\t' ? 'Tab/Excel格式' : 'CSV格式';
        el.textContent = '已识别 ' + (data.length - 1) + ' 行数据（' + fmt + '）';
        parseData(data);
      } catch (err) {
        showError('解析失败：' + err.message);
      }
    }

    function parseData(data) {
      if (data.length < 2) { showError('数据为空或格式不正确'); return; }
      headers = data[0].map(String);
      rawRows = [];
      for (var i = 1; i < data.length; i++) {
        var obj = {};
        for (var j = 0; j < headers.length; j++) {
          obj[headers[j]] = data[i][j] !== undefined ? data[i][j] : '';
        }
        var hasVal = false;
        for (var j = 0; j < headers.length; j++) { if (obj[headers[j]] !== '') { hasVal = true; break; } }
        if (hasVal) rawRows.push(obj);
      }
      if (rawRows.length === 0) { showError('解析后数据为空'); return; }
      populateMapping();
    }

    function populateMapping() {
      var grid = document.getElementById('mappingGrid');
      grid.innerHTML = '';

      var usedRoles = {};
      var colRoles = {};
      for (var i = 0; i < headers.length; i++) {
        var role = detectRole(headers[i]);
        if (role && !usedRoles[role]) {
          colRoles[headers[i]] = role;
          usedRoles[role] = true;
        } else {
          colRoles[headers[i]] = '';
        }
      }

      for (var i = 0; i < headers.length; i++) {
        (function(col, assignedRole) {
          var div = document.createElement('div');

          var lbl = document.createElement('label');
          lbl.title = col;
          lbl.textContent = col;

          var sel = document.createElement('select');
          sel.setAttribute('data-col', col);

          for (var j = 0; j < roleOptions.length; j++) {
            var opt = document.createElement('option');
            opt.value = roleOptions[j].v;
            opt.textContent = roleOptions[j].t;
            if (assignedRole === roleOptions[j].v) opt.selected = true;
            sel.appendChild(opt);
          }

          if (assignedRole) sel.className = 'role-matched';

          sel.addEventListener('change', function() {
            if (this.value) { this.className = 'role-matched'; }
            else { this.className = ''; }
            refreshPreview();
          });

          div.appendChild(lbl);
          div.appendChild(sel);
          grid.appendChild(div);
        })(headers[i], colRoles[headers[i]]);
      }

      document.getElementById('mappingCard').classList.remove('hidden');
      refreshPreview();
    }

    function refreshPreview() {
      var colBuyer = getRoleCol('buyerId');
      var colOrder = getRoleCol('orderId');
      var colNickname = getRoleCol('nickname');
      var colAmt = getRoleCol('amount');

      document.getElementById('previewCard').classList.remove('hidden');
      document.getElementById('drawCard').classList.remove('hidden');

      if (!colBuyer) {
        document.getElementById('stats').innerHTML = '<div style="color:#ff8080;font-size:0.9rem;padding:8px 0">请在上方将某一列设置为「★ 买家ID（去重用）」</div>';
        document.getElementById('previewHead').innerHTML = '';
        document.getElementById('previewBody').innerHTML = '';
        document.getElementById('drawBtn').disabled = true;
        document.getElementById('drawBtn').textContent = '请先指定买家ID列';
        document.getElementById('drawCountHint').textContent = '';
        return;
      }

      var uniqueBuyers = getUniqueBuyers();
      var orderCounts = getOrderCountsMap();
      var tier1Count = 0, tier2Count = 0;
      for (var key in orderCounts) {
        if (orderCounts[key] >= 10) tier1Count++;
        if (orderCounts[key] >= 5) tier2Count++;
      }

      document.getElementById('stats').innerHTML =
        '<div class="stat-box"><div class="num"><span class="snum" data-v="' + rawRows.length.toLocaleString() + '">****</span></div><div class="label">总行数</div></div>' +
        '<div class="stat-box"><div class="num"><span class="snum" data-v="' + uniqueBuyers.size.toLocaleString() + '">****</span></div><div class="label">去重后用户数</div></div>' +
        '<div class="stat-box"><div class="num"><span class="snum" data-v="' + tier1Count + '">****</span></div><div class="label">&#129351; 一等奖候选（&#8805;10单）</div></div>' +
        '<div class="stat-box"><div class="num"><span class="snum" data-v="' + tier2Count + '">****</span></div><div class="label">&#129352; 二等奖候选（&#8805;5单）</div></div>';
      applyNumVisibility();

      var previewCols = [];
      if (colBuyer) previewCols.push({ col: colBuyer, mask: 'id' });
      if (colNickname) previewCols.push({ col: colNickname, mask: 'name' });
      if (colOrder) previewCols.push({ col: colOrder, mask: 'none' });
      if (colAmt) previewCols.push({ col: colAmt, mask: 'none' });

      var headHtml = '';
      for (var i = 0; i < previewCols.length; i++) headHtml += '<th>' + esc(previewCols[i].col) + '</th>';
      document.getElementById('previewHead').innerHTML = headHtml;

      var bodyHtml = '';
      var preview = rawRows.slice(0, 50);
      for (var i = 0; i < preview.length; i++) {
        var r = preview[i];
        bodyHtml += '<tr>';
        for (var j = 0; j < previewCols.length; j++) {
          var val = String(r[previewCols[j].col]);
          if (previewCols[j].mask === 'id') val = maskId(val);
          else if (previewCols[j].mask === 'name') val = maskName(val);
          bodyHtml += '<td>' + esc(val) + '</td>';
        }
        bodyHtml += '</tr>';
      }
      document.getElementById('previewBody').innerHTML = bodyHtml;

      updateDrawHint();
    }

    document.getElementById('drawCount').addEventListener('input', function() {
      if (rawRows.length > 0) updateDrawHint();
    });

    function updateDrawHint() {
      if (!rawRows.length) return;
      var pool = getPoolForTier(currentTier);
      var poolSize = pool.length;
      var n = getDrawCount();
      var actual = Math.min(n, poolSize);
      var tierLabel = currentTier === 'first' ? '一等奖候选人' : currentTier === 'second' ? '二等奖候选人' : '买家';
      var hint = '';
      if (poolSize > 0) {
        var sn = '<span class="snum" data-v="' + poolSize + '">****</span>';
        hint = poolSize < n ? '（' + tierLabel + '共 ' + sn + ' 人，将全部中奖）' : '（将从 ' + sn + ' 人中抽取）';
      } else {
        hint = '（无符合条件的候选人）';
      }
      document.getElementById('drawCountHint').innerHTML = hint;
      applyNumVisibility();
      var tierPrefix = currentTier === 'first' ? '【一等奖】' : currentTier === 'second' ? '【二等奖】' : '';
      document.getElementById('drawBtn').textContent = tierPrefix + '开始抽奖（抽 ' + actual + ' 人）';
      document.getElementById('drawBtn').disabled = poolSize === 0;
    }

    var numsVisible = false;

    function applyNumVisibility() {
      var snums = document.querySelectorAll('.snum');
      for (var i = 0; i < snums.length; i++) {
        snums[i].textContent = numsVisible ? snums[i].getAttribute('data-v') : '****';
      }
    }

    document.getElementById('statsToggleBtn').addEventListener('click', function() {
      numsVisible = !numsVisible;
      applyNumVisibility();
      this.innerHTML = numsVisible ? '&#128065; 隐藏数字' : '&#128065; 显示数字';
    });

    document.getElementById('drawBtn').addEventListener('click', doDraw);
    document.getElementById('redrawBtn').addEventListener('click', doDraw);
    document.getElementById('tierAll').addEventListener('click', function() { selectTier('all'); });
    document.getElementById('tier1st').addEventListener('click', function() { selectTier('first'); });
    document.getElementById('tier2nd').addEventListener('click', function() { selectTier('second'); });

    function doDraw() {
      var colBuyer = getRoleCol('buyerId');
      var colOrder = getRoleCol('orderId');
      var colNickname = getRoleCol('nickname');
      var colAmt = getRoleCol('amount');
      var pool = getPoolForTier(currentTier);
      for (var i = pool.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
      }
      var winners = pool.slice(0, Math.min(getDrawCount(), pool.length));
      var tierTitle = currentTier === 'first' ? '&#129351; 一等奖中奖名单' : currentTier === 'second' ? '&#129352; 二等奖中奖名单' : '&#127881; 中奖名单';
      document.getElementById('winnersTitle').innerHTML = tierTitle;
      var grid = document.getElementById('winnersGrid');
      grid.innerHTML = '';
      for (var i = 0; i < winners.length; i++) {
        var w = winners[i];
        var card = document.createElement('div');
        card.className = 'winner-card';
        card.style.animationDelay = (i * 80) + 'ms';
        var nickname = colNickname ? String(w[colNickname]).trim() : '';
        var rankPrefix = currentTier === 'first' ? '&#129351; 一等奖 第 ' : currentTier === 'second' ? '&#129352; 二等奖 第 ' : '&#127881; 第 ';
        var html = '<div class="winner-rank">' + rankPrefix + (i + 1) + ' 名</div>';
        if (nickname) {
          html += '<div class="winner-buyer">' + esc(maskName(nickname)) + '</div>';
          html += '<div class="winner-order" style="font-size:0.8rem;color:#a0b4c8;margin-top:2px">ID：' + esc(maskId(w[colBuyer])) + '</div>';
        } else {
          html += '<div class="winner-buyer">买家：' + esc(maskId(w[colBuyer])) + '</div>';
        }
        if (colOrder) html += '<div class="winner-order">订单：' + esc(String(w[colOrder])) + '</div>';
        if (colAmt) html += '<div class="winner-amount">金额：' + esc(String(w[colAmt])) + '</div>';
        card.innerHTML = html;
        grid.appendChild(card);
      }
      document.getElementById('winnersCard').classList.remove('hidden');
      document.getElementById('winnersCard').scrollIntoView({ behavior: 'smooth' });
      launchConfetti();
      document.getElementById('exportBtn')._winners = winners;
      document.getElementById('exportBtn')._cols = { colBuyer: colBuyer, colOrder: colOrder, colNickname: colNickname, colAmt: colAmt };
      document.getElementById('exportBtn')._tier = currentTier;
    }

    document.getElementById('exportBtn').addEventListener('click', function() {
      var w = this._winners;
      var c = this._cols;
      var tier = this._tier || 'all';
      if (!w) return;
      var hdrs, colCount, tierName;
      if (tier === 'first') { tierName = '一等奖'; }
      else if (tier === 'second') { tierName = '二等奖'; }
      else { tierName = ''; }

      var baseHdrs = [];
      if (tierName) baseHdrs.push('奖项');
      baseHdrs.push('买家ID');
      if (c.colNickname) baseHdrs.push('用户昵称');
      if (c.colOrder) baseHdrs.push('订单ID');
      if (c.colAmt) baseHdrs.push('订单金额');
      hdrs = ['名次'].concat(baseHdrs);
      colCount = hdrs.length;

      var ws = {};
      for (var i = 0; i < hdrs.length; i++) {
        ws[XLSX.utils.encode_cell({ r: 0, c: i })] = { t: 's', v: hdrs[i] };
      }
      for (var ri = 0; ri < w.length; ri++) {
        var r = w[ri];
        var cells = [{ t: 'n', v: ri + 1 }];
        if (tierName) cells.push({ t: 's', v: tierName });
        cells.push({ t: 's', v: String(r[c.colBuyer]) });
        if (c.colNickname) cells.push({ t: 's', v: String(r[c.colNickname]) });
        if (c.colOrder) cells.push({ t: 's', v: String(r[c.colOrder]) });
        if (c.colAmt) cells.push({ t: 's', v: String(r[c.colAmt]) });
        for (var ci = 0; ci < cells.length; ci++) {
          ws[XLSX.utils.encode_cell({ r: ri + 1, c: ci })] = cells[ci];
        }
      }
      ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: w.length, c: colCount - 1 } });
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '中奖名单');
      var fileName = tier === 'first' ? '一等奖名单.xlsx' : tier === 'second' ? '二等奖名单.xlsx' : '中奖名单.xlsx';
      XLSX.writeFile(wb, fileName);
    });

    function launchConfetti() {
      var canvas = document.getElementById('confetti');
      var ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      var pieces = [];
      for (var i = 0; i < 120; i++) {
        var hue = Math.round(Math.random() * 60 + 30);
        pieces.push({
          x: Math.random() * canvas.width, y: -20,
          w: 6 + Math.random() * 8, h: 10 + Math.random() * 6,
          color: 'hsl(' + hue + ',90%,60%)',
          vx: (Math.random() - 0.5) * 4,
          vy: 2 + Math.random() * 3,
          rot: Math.random() * 360,
          vr: (Math.random() - 0.5) * 8
        });
      }
      var frame;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var alive = false;
        for (var i = 0; i < pieces.length; i++) {
          var p = pieces[i];
          p.x += p.vx; p.y += p.vy; p.rot += p.vr;
          if (p.y < canvas.height + 20) alive = true;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }
        if (alive) frame = requestAnimationFrame(draw);
        else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      cancelAnimationFrame(frame);
      draw();
    }
  </script>
